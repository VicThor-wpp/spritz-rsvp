<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Pivot — Lector RSVP</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1a1a1a;
    --text: #e8e8e8; --dim: #555; --dim2: #888;
    --accent: #e74c3c; --accent2: #ff6b5b;
    --green: #2ecc71; --border: #222; --radius: 12px;
  }
  html, body { height: 100%; }
  body {
    font-family: 'SF Mono','Fira Code','Consolas',monospace;
    background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; flex-direction: column;
    overflow: hidden; -webkit-tap-highlight-color: transparent; user-select: none;
  }
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; border-bottom:1px solid var(--border); flex-shrink:0;
    background: var(--bg); z-index:10;
  }
  header h1 { font-size:15px; font-weight:600; letter-spacing:1px; }
  header h1 span { color:var(--accent); }

  .view { display:none; flex-direction:column; flex:1 1 0; min-height:0; overflow:hidden; }
  .view.active { display:flex; }

  button {
    background:var(--accent); color:#fff; border:none; border-radius:var(--radius);
    padding:10px 20px; font-family:inherit; font-size:14px; font-weight:600;
    cursor:pointer; transition:background .15s; white-space:nowrap;
  }
  button:active { background:var(--accent2); }
  button.secondary { background:var(--surface); border:1px solid var(--border); }
  button.sm { padding:6px 14px; font-size:12px; }

  /* --- LIBRARY --- */
  .library { flex:1 1 0; min-height:0; padding:16px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .library-empty { text-align:center; color:var(--dim); padding:40px 20px; font-size:14px; }
  .book-card { position:relative; }
  .bc-del { position:absolute; top:6px; right:6px; background:none; border:none; color:var(--dim); font-size:18px; line-height:1; padding:6px 10px; border-radius:6px; }
  .bc-del:active { background:var(--surface2); color:var(--accent); }
  .bc-row { display:flex; gap:12px; align-items:center; }
  .bc-cover { width:44px; height:60px; border-radius:6px; flex:none; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:20px; color:rgba(255,255,255,.85); }
  .bc-body { flex:1; min-width:0; }
  .continue-hero { background:var(--surface); border:1px solid var(--accent); border-radius:var(--radius); padding:14px 16px; margin-bottom:12px; cursor:pointer; }
  .continue-hero:active { background:var(--surface2); }
  .continue-hero .hero-label { color:var(--accent); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
  .continue-hero .hero-book { font-weight:600; margin-top:4px; }
  .continue-hero .hero-detail { color:var(--dim2); font-size:12px; margin-top:2px; }
  .library-footer { display:flex; gap:8px; align-items:center; justify-content:center; padding:8px 0 0; color:var(--dim); font-size:12px; }
  .library-footer button { background:none; border:none; color:var(--dim2); font-size:12px; padding:4px 6px; text-decoration:underline; }
  .empty-actions { margin-top:16px; }
  .empty-actions button { background:var(--surface2); border:1px solid #2a2a2a; color:var(--text); font-size:13px; padding:10px 16px; }
  .stats-strip { display:flex; gap:8px; margin-bottom:12px; }
  .stats-strip .stat { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:10px 4px; text-align:center; min-width:0; }
  .stats-strip .stat-v { font-size:17px; font-weight:700; }
  .stats-strip .stat-l { font-size:10px; color:var(--dim2); margin-top:2px; }
  .wpm-presets { display:flex; gap:6px; justify-content:center; margin-top:6px; }
  .wpm-presets .preset { background:var(--surface); border:1px solid var(--border); color:var(--dim2); font-size:12px; font-weight:600; padding:5px 0; flex:1; max-width:72px; border-radius:8px; }
  .wpm-presets .preset.active { border-color:var(--accent); color:var(--text); }
  .book-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px 16px; margin-bottom:10px; cursor:pointer; transition:border-color .15s;
  }
  .book-card:active { border-color:var(--accent); }
  .book-card .bc-title { font-size:15px; font-weight:600; margin-bottom:4px; }
  .book-card .bc-meta { font-size:12px; color:var(--dim); }
  .book-card .bc-progress { margin-top:8px; }
  .book-card .bc-progress-bar { width:100%; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .book-card .bc-progress-fill { height:100%; background:var(--green); transition:width .3s; }
  .book-card .bc-progress-text { font-size:11px; color:var(--dim); margin-top:4px; }
  .book-card .bc-resume { color:var(--green); font-size:12px; margin-top:6px; font-weight:600; }
  .library-actions { display:flex; gap:8px; padding:0 16px 16px; }
  .library-actions button { flex:1; }

  /* --- CHAPTERS --- */
  .chapters-header { padding:12px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .chapters-header .ch-title { font-size:16px; font-weight:600; }
  .chapters-header .ch-author { font-size:12px; color:var(--dim); }
  .chapters-list { flex:1 1 0; min-height:0; overflow-y:auto; padding:8px 16px; -webkit-overflow-scrolling:touch; }
  .ch-item {
    display:flex; align-items:center; gap:12px;
    padding:12px; border-bottom:1px solid var(--border); cursor:pointer;
  }
  .ch-item:active { background:var(--surface); }
  .ch-item .ch-num { color:var(--dim); font-size:13px; min-width:28px; }
  .ch-item .ch-info { flex:1; }
  .ch-item .ch-name { font-size:14px; }
  .ch-item .ch-words { font-size:11px; color:var(--dim); }
  .ch-item .ch-read { width:8px; height:8px; border-radius:50%; background:var(--green); flex-shrink:0; }
  .ch-item .ch-current { background:var(--accent); }
  .ch-item.resuming { background:var(--surface2); }

  /* --- INPUT --- */
  #view-input { padding:16px; gap:12px; }
  .input-group label {
    display:block; font-size:12px; color:var(--dim);
    margin-bottom:6px; text-transform:uppercase; letter-spacing:1px;
  }
  textarea {
    width:100%; flex:1; min-height:120px; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius);
    color:var(--text); font-family:inherit; font-size:14px;
    padding:12px; resize:none; outline:none;
  }
  textarea:focus { border-color:var(--accent); }
  .url-row { display:flex; gap:8px; }
  .url-row input {
    flex:1; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); color:var(--text); font-family:inherit;
    font-size:14px; padding:10px 12px; outline:none;
  }
  .url-row input:focus { border-color:var(--accent); }
  .btn-row { display:flex; gap:8px; }
  .btn-row button { flex:1; }
  #extract-status { font-size:12px; color:var(--dim); min-height:18px; }

  /* --- SPLIT READER --- */
  #view-reader { position:relative; }

  .split-container {
    flex:1 1 0; min-height:0; display:flex; flex-direction:column; position:relative; overflow:hidden;
  }

  /* Top: RSVP */
  .split-rsvp {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; overflow:hidden; flex-shrink:0;
    background: var(--bg);
  }
  .orp-line {
    position:absolute; left:50%; top:15%; bottom:15%;
    width:2px; background:var(--accent); opacity:.2; pointer-events:none;
  }
  .word-display {
    font-size:clamp(32px,9vw,68px); font-weight:700; letter-spacing:2px;
    white-space:nowrap; text-align:center;
  }
  .word-display .orp { color:var(--accent); }
  .rsvp-meta {
    font-size:11px; color:var(--dim); margin-top:6px; text-align:center;
    padding:0 16px;
  }

  /* Drag handle */
  .split-handle {
    height:24px; background:var(--surface); display:flex;
    align-items:center; justify-content:center; cursor:ns-resize;
    flex-shrink:0; border-top:1px solid var(--border); border-bottom:1px solid var(--border);
    touch-action:none; z-index:5;
  }
  .split-handle .grip {
    width:40px; height:4px; background:var(--dim); border-radius:2px;
  }

  /* Bottom: ereader text */
  .split-reader {
    flex:1 1 0; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
    background:#111; padding:16px 20px;
    font-family:'Georgia','Times New Roman','Noto Serif',serif;
    font-size:17px; line-height:1.75; color:#bbb;
    user-select:text;
  }
  .split-reader p { margin-bottom:.8em; }
  /* Per-word state: default = upcoming (light), .passed = already read (dim), .current = highlighted */
  .split-reader .w { color:#c8c8c8; cursor:pointer; contain:layout style; }
  .split-reader .w.passed { color:#555; }
  .split-reader .w.current { color:var(--accent); font-weight:600; }

  /* Controls bar */
  .reader-controls {
    padding:10px 16px 14px; display:flex; flex-direction:column; gap:8px;
    flex-shrink:0; border-top:1px solid var(--border); background:var(--bg);
  }
  .progress-bar { width:100%; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-bar .fill { height:100%; background:var(--accent); transition:width .1s linear; width:0%; }
  .wpm-row { display:flex; align-items:center; gap:10px; }
  .wpm-row label { font-size:11px; color:var(--dim); white-space:nowrap; }
  .wpm-row .wpm-val { font-size:18px; font-weight:700; min-width:48px; text-align:right; }
  input[type=range] {
    flex:1; -webkit-appearance:none; appearance:none;
    height:4px; background:var(--border); border-radius:2px; outline:none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:20px; height:20px;
    background:var(--accent); border-radius:50%; cursor:pointer;
  }
  .ctrl-btns { display:flex; gap:6px; justify-content:center; }
  .ctrl-btns button {
    width:48px; height:48px; border-radius:50%; padding:0;
    font-size:18px; display:flex; align-items:center; justify-content:center;
  }
  .ctrl-btns button.play-btn { width:56px; height:56px; font-size:22px; }
  .chapter-nav { display:flex; gap:6px; }
  .chapter-nav button { flex:1; }

  .reader-top {
    display:flex; justify-content:space-between; align-items:center;
    padding:4px 16px; font-size:11px; color:var(--dim); flex-shrink:0;
  }

  .finished-msg { font-size:16px; color:var(--dim); text-align:center; }
  .finished-msg span { color:var(--accent); font-weight:700; }

  /* Loading */
  .loading {
    position:fixed; inset:0; background:rgba(0,0,0,.8);
    display:none; align-items:center; justify-content:center;
    z-index:100; font-size:16px; flex-direction:column; gap:12px;
  }
  .loading.active { display:flex; }
  .spinner {
    width:32px; height:32px; border:3px solid var(--border);
    border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Toast — always-visible feedback overlay (replaces hidden extractStatus errors) */
  .toast {
    position:fixed; left:50%; bottom:24px; transform:translate(-50%, 80px);
    background:var(--surface2); border:1px solid var(--border); color:var(--text);
    padding:10px 16px; border-radius:var(--radius); font-size:13px;
    box-shadow:0 6px 24px rgba(0,0,0,.5); z-index:200;
    max-width:min(90vw, 420px); pointer-events:none; opacity:0;
    transition:transform .25s ease, opacity .25s ease; white-space:pre-wrap;
  }
  .toast.show { transform:translate(-50%, 0); opacity:1; }
  .toast.error { border-color:var(--accent); }
  .toast.info { border-color:var(--green); }
</style>
</head>
<body>

<header>
  <h1>P<span>I</span>VOT</h1>
  <button id="btn-back" class="secondary sm" style="display:none;">&larr;</button>
</header>

<!-- LIBRARY -->
<div id="view-library" class="view active">
  <div class="library" id="library-list"></div>
  <div class="library-footer">
    <button id="btn-export">Exportar</button>·<button id="btn-import">Importar</button>
    <span id="storage-info"></span>
    <input type="file" id="import-input" accept=".json,application/json" style="display:none">
  </div>
  <div class="library-actions">
    <label style="flex:1;display:block;">
      <input type="file" id="file-input" accept=".pdf,.epub,.txt" style="display:none">
      <button class="secondary" style="width:100%;" onclick="document.getElementById('file-input').click()">+ Archivo</button>
    </label>
    <button class="secondary" id="btn-show-input" style="flex:1;">Texto / URL</button>
  </div>
</div>

<!-- CHAPTERS -->
<div id="view-chapters" class="view">
  <div class="chapters-header">
    <div class="ch-title" id="ch-book-title"></div>
    <div class="ch-author" id="ch-book-author"></div>
  </div>
  <div class="chapters-list" id="chapters-list"></div>
</div>

<!-- INPUT -->
<div id="view-input" class="view">
  <div class="input-group">
    <label>URL</label>
    <div class="url-row">
      <input type="url" id="url-input" placeholder="https://...">
      <button id="btn-extract">Extraer</button>
    </div>
    <div id="extract-status"></div>
  </div>
  <div class="input-group" style="flex:1;display:flex;flex-direction:column;">
    <label>Texto</label>
    <textarea id="text-input" placeholder="Pegá texto acá..."></textarea>
  </div>
  <div class="btn-row"><button id="btn-start">Leer</button></div>
</div>

<!-- SPLIT READER -->
<div id="view-reader" class="view">
  <div class="reader-top">
    <span id="reader-info"></span>
    <span id="reader-progress"></span>
  </div>
  <div class="split-container" id="split-container">
    <div class="split-rsvp" id="split-rsvp">
      <div class="orp-line"></div>
      <div class="word-display" id="word-display">.</div>
      <div class="rsvp-meta" id="rsvp-meta"></div>
    </div>
    <div class="split-handle" id="split-handle"><div class="grip"></div></div>
    <div class="split-reader" id="split-reader"></div>
  </div>
  <div class="reader-controls">
    <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
    <div class="wpm-row">
      <label>WPM</label>
      <input type="range" id="wpm-slider" min="100" max="900" value="350" step="10">
      <span class="wpm-val" id="wpm-display">350</span>
    </div>
    <div class="wpm-presets" id="wpm-presets">
      <button class="preset" data-wpm="250">250</button>
      <button class="preset" data-wpm="350">350</button>
      <button class="preset" data-wpm="450">450</button>
      <button class="preset" data-wpm="600">600</button>
    </div>
    <div class="ctrl-btns">
      <button class="secondary" id="btn-reset" title="Reiniciar">&#8634;</button>
      <button class="secondary" id="btn-back10" title="-10">&#171;</button>
      <button class="play-btn" id="btn-play" title="Play/Pause">&#9654;</button>
      <button class="secondary" id="btn-fwd10" title="+10">&#187;</button>
      <button class="secondary" id="btn-close" title="Volver">&#10005;</button>
    </div>
    <div class="chapter-nav" id="chapter-nav" style="display:none;">
      <button class="secondary sm" id="btn-prev-ch">Cap. anterior</button>
      <button class="secondary sm" id="btn-next-ch">Cap. siguiente</button>
    </div>
  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div><span id="loading-text">Cargando...</span></div>
<div class="toast" id="toast"></div>

<script>
function esc(s){
  if(s==null) return '';
  const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML;
}

let _toastTimer=null;
function showToast(msg, type='error', durationMs=4000){
  const t=document.getElementById('toast'); if(!t) return;
  t.textContent=msg; t.className='toast '+type+' show';
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{ t.className='toast '+type; }, durationMs);
}

window.addEventListener('error', (e)=>{
  console.error('[spritz] global error:', e.message, e.filename+':'+e.lineno, e.error);
  showToast('Error: '+(e.message||'desconocido'));
});
window.addEventListener('unhandledrejection', (e)=>{
  console.error('[spritz] unhandled rejection:', e.reason);
  const msg = e.reason?.message || String(e.reason || 'unknown');
  showToast('Error: '+msg);
});

async function fetchJSON(url, opts){
  const resp = await fetch(url, opts);
  let data = null;
  try { data = await resp.json(); } catch(parseErr){
    if(!resp.ok) throw new Error('HTTP '+resp.status+' (no JSON body)');
    throw new Error('Respuesta no es JSON válido');
  }
  if(!resp.ok){
    const detail = data && data.error ? data.error : ('HTTP '+resp.status);
    const err = new Error(detail); err.status = resp.status; err.data = data; throw err;
  }
  if(data && data.error){
    const err = new Error(data.error); err.data = data; throw err;
  }
  return data;
}

// ==================== ORP ====================
function orpIndex(w) {
  const l=w.length; if(l<=1)return 0; if(l<=3)return 1;
  if(l<=5)return 2; if(l<=9)return 3; if(l<=13)return 4; return 5;
}
function wordDelay(w, base) {
  const len = [...w].length;
  let f;
  if (len <= 1) f = 0.70;
  else if (len === 2) f = 0.78;
  else if (len === 3) f = 0.86;
  else if (len === 4) f = 0.92;
  else if (len === 5) f = 0.97;
  else if (len === 6) f = 1.00;
  else if (len <= 8) f = 1.04 + (len - 7) * 0.04;
  else if (len <= 12) f = 1.14 + (len - 9) * 0.05;
  else f = Math.min(1.55, 1.34 + (len - 13) * 0.04);
  const last = w[w.length - 1];
  if (w.endsWith('...') || w.endsWith('\u2026')) f *= 1.55;
  else if ('.!?'.includes(last)) f *= 1.85;
  else if (last === ';' || last === ':') f *= 1.5;
  else if (last === ',') f *= 1.35;
  else if ('\u2014\u2013-'.includes(last)) f *= 1.3;
  else if (')]\u201d\u00bb'.includes(last)) f *= 1.15;
  else if ('\u00bf\u00a1'.includes(last)) f *= 1.2;
  return base * f;
}
function tokenize(t) { return t.split(/\s+/).filter(w=>w.length>0); }
function renderWord(w) {
  const i=orpIndex(w);
  return `${esc(w.slice(0,i))}<span class="orp">${esc(w[i]||'')}</span>${esc(w.slice(i+1))}`;
}

// ==================== STATE ====================
const app = {
  words:[], rawText:'', index:0, wpm:350, playing:false, timer:null,
  bookId:null, chapterIdx:null, totalChapters:0,
  splitRatio: 0.4,
};
window.app = app;

// ==================== PERSISTENCE ====================
function getProgress(bid) {
  try { return JSON.parse(localStorage.getItem('spritz-progress-'+bid)); }
  catch(err){ console.warn('[spritz] corrupt progress for '+bid+':', err); return null; }
}
function saveProgress() {
  if(!app.bookId) return;
  try {
    localStorage.setItem('spritz-progress-'+app.bookId, JSON.stringify({
      chapterIdx:app.chapterIdx, wordIndex:app.index, timestamp:Date.now()
    }));
  } catch(err){ console.error('[spritz] saveProgress failed:', err); }
}
function getReadChapters(bid) {
  try { return JSON.parse(localStorage.getItem('spritz-read-'+bid)||'[]'); }
  catch(err){ console.warn('[spritz] corrupt read-chapters for '+bid+':', err); return []; }
}
function markChapterRead(bid,i) {
  const r=getReadChapters(bid); if(!r.includes(i))r.push(i);
  localStorage.setItem('spritz-read-'+bid, JSON.stringify(r));
}
let _st=null;
function debouncedSave() { clearTimeout(_st); _st=setTimeout(saveProgress,500); }

// ==================== READING STATS ====================
// Acumula en memoria y flushea a localStorage cada 100 palabras, al pausar
// y al ocultarse la pestaña. Fechas en hora LOCAL (toISOString es UTC y en
// UY-3 el día cambiaría a las 21:00, rompiendo las rachas).
const _pend={words:0,ms:0};
function todayKey(d=new Date()){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function loadStats(){
  try { return JSON.parse(localStorage.getItem('spritz-stats'))||{}; }
  catch(err){ console.warn('[spritz] corrupt stats:', err); return {}; }
}
function flushStats(){
  if(!_pend.words) return;
  try {
    const s=loadStats();
    s.totalWords=(s.totalWords||0)+_pend.words;
    s.totalMs=(s.totalMs||0)+_pend.ms;
    s.days=s.days||{};
    const day=todayKey();
    s.days[day]=(s.days[day]||0)+_pend.words;
    const keys=Object.keys(s.days).sort();
    while(keys.length>90) delete s.days[keys.shift()];
    localStorage.setItem('spritz-stats',JSON.stringify(s));
  } catch(err){ console.error('[spritz] flushStats failed:', err); }
  _pend.words=0; _pend.ms=0;
}
function calcStreak(days){
  if(!days) return 0;
  let n=0; const d=new Date();
  if(!days[todayKey(d)]) d.setDate(d.getDate()-1); // la racha sigue viva hasta que termine hoy
  while(days[todayKey(d)]){ n++; d.setDate(d.getDate()-1); }
  return n;
}
function fmtCompact(n){
  if(n>=1000000) return (n/1000000).toFixed(1).replace('.',',')+'M';
  if(n>=10000) return Math.round(n/1000)+'k';
  if(n>=1000) return (n/1000).toFixed(1).replace('.',',')+'k';
  return String(n);
}

// ==================== LOCAL LIBRARY (IndexedDB, ADR-013) ====================
// Books live only in this browser. The server converts files in memory and
// returns the full book; nothing a user uploads is stored server-side.
const DB_NAME='pivot', DB_STORE='books';
function openDb(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=()=>req.result.createObjectStore(DB_STORE,{keyPath:'id'});
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
}
async function idbTx(mode,fn){
  const db=await openDb();
  return new Promise((res,rej)=>{
    const tx=db.transaction(DB_STORE,mode);
    const req=fn(tx.objectStore(DB_STORE));
    tx.oncomplete=()=>res(req?req.result:undefined);
    tx.onerror=()=>rej(tx.error);
  });
}
const idbPutBook=b=>idbTx('readwrite',s=>s.put(b));
const idbGetBook=id=>idbTx('readonly',s=>s.get(id));
const idbAllBooks=()=>idbTx('readonly',s=>s.getAll());
const idbDeleteBook=id=>idbTx('readwrite',s=>s.delete(id));

// Libro demo embebido: dominio público (Horacio Quiroga, 1878-1937)
const DEMO_TITLE='A la deriva', DEMO_AUTHOR='Horacio Quiroga';
const DEMO_TEXT="El hombre pisó algo blanduzco, y enseguida sintió la mordedura en el pie. Saltó adelante, y al volverse con un juramento vio una yararacusú que arrollada sobre sí misma, esperaba otro ataque.\nEl hombre echó una veloz ojeada a su pie, donde dos gotitas de sangre engrosaban dificultosamente, y sacó el machete de la cintura. La víbora vio la amenaza, y hundió más la cabeza en el centro mismo de su espiral; pero el machete cayó de plano, dislocándole las vértebras.\nEl hombre se bajó hasta la mordedura, quitó las gotitas de sangre, y durante un instante contempló. Un dolor agudo nacía de los dos puntitos violetas, y comenzaba a invadir todo el pie. Apresuradamente se ligó el tobillo con su pañuelo y siguió por la picada hacia su rancho.\nEl dolor en el pie aumentaba, con sensación de tirante abultamiento, y de pronto el hombre sintió dos o tres fulgurantes puntadas que, como relámpagos habían irradiado desde la herida hasta la mitad de la pantorrilla. Movía la pierna con dificultad; una metálica sequedad de garganta, seguida de sed quemante, le arrancó un nuevo juramento.\nLlegó por fin al rancho, y se echó de brazos sobre la rueda de un trapiche. Los dos puntitos violeta desaparecían ahora en la monstruosa hinchazón del pie entero. La piel parecía adelgazada y a punto de ceder, de tensa. Quiso llamar a su mujer, y la voz se quebró en un ronco arrastre de garganta reseca. La sed lo devoraba.\n—¡Dorotea! —alcanzó a lanzar en un estertor—. ¡Dame caña!\nSu mujer corrió con un vaso lleno, que el hombre sorbió en tres tragos. Pero no había sentido gusto alguno.\n—¡Te pedí caña, no agua! —rugió de nuevo—. ¡Dame caña!\n—¡Pero es caña, Paulino! —protestó la mujer espantada.\n—¡No, me diste agua! ¡Quiero caña, te digo!\nLa mujer corrió otra vez, volviendo con la damajuana. El hombre tragó uno tras otro dos vasos, pero no sintió nada en la garganta.\n—Bueno; esto se pone feo —murmuró entonces, mirando su pie lívido y ya con lustre gangrenoso. Sobre la honda ligadura del pañuelo, la carne desbordaba como una monstruosa morcilla.\nLos dolores fulgurantes se sucedían en continuos relampagueos, y llegaban ahora a la ingle. La atroz sequedad de garganta que el aliento parecía caldear más, aumentaba a la par. Cuando pretendió incorporarse, un fulminante vómito lo mantuvo medio minuto con la frente apoyada en la rueda de palo.\nPero el hombre no quería morir, y descendiendo hasta la costa subió a su canoa. Sentóse en la popa y comenzó a palear hasta el centro del Paraná. Allí la corriente del río, que en las inmediaciones del Iguazú corre seis millas, lo llevaría antes de cinco horas a Tacurú-Pucú.\nEl hombre, con sombría energía, pudo efectivamente llegar hasta el medio del río; pero allí sus manos dormidas dejaron caer la pala en la canoa, y tras un nuevo vómito —de sangre esta vez— dirigió una mirada al sol que ya trasponía el monte.\nLa pierna entera, hasta medio muslo, era ya un bloque deforme y durísimo que reventaba la ropa. El hombre cortó la ligadura y abrió el pantalón con su cuchillo: el bajo vientre desbordó hinchado, con grandes manchas lívidas y terriblemente doloroso. El hombre pensó que no podría jamás llegar él solo a Tacurú-Pucú, y se decidió a pedir ayuda a su compadre Alves, aunque hacía mucho tiempo que estaban disgustados.\nLa corriente del río se precipitaba ahora hacia la costa brasileña, y el hombre pudo fácilmente atracar. Se arrastró por la picada en cuesta arriba, pero a los veinte metros, exhausto, quedó tendido de pecho.\n—¡Alves! —gritó con cuanta fuerza pudo; y prestó oído en vano-. ¡Compadre Alves! ¡No me niegue este favor! —clamó de nuevo, alzando la cabeza del suelo. En el silencio de la selva no se oyó un solo rumor. El hombre tuvo aún valor para llegar hasta su canoa, y la corriente, cogiéndola de nuevo, la llevó velozmente a la deriva.\nEl Paraná corre allí en el fondo de una inmensa hoya, cuyas paredes, altas de cien metros, encajonan fúnebremente el río. Desde las orillas bordeadas de negros bloques de basalto, asciende el bosque, negro también. Adelante, a los costados, atrás, la eterna muralla lúgubre, en cuyo fondo el río arremolinado se precipita en incesantes borbollones de agua fangosa. El paisaje es agresivo, y reina en él un silencio de muerte. Al atardecer, sin embargo, su belleza sombría y calma cobra una majestad única.\nEl sol había caído ya cuando el hombre, semitendido en el fondo de la canoa, tuvo un violento escalofrío. Y de pronto, con asombro, enderezó pesadamente la cabeza: se sentía mejor. La pierna le dolía apenas, la sed disminuía, y su pecho, libre ya, se abría en lenta inspiración.\nEl veneno comenzaba a irse, no había duda. Se hallaba casi bien, y aunque no tenía fuerzas para mover la mano, contaba con la caída del rocío para reponerse del todo. Calculó que antes de tres horas estaría en Tacurú-Pucú.\nEl bienestar avanzaba, y con él una somnolencia llena de recuerdos. No sentía ya nada ni en la pierna ni en el vientre. ¿Viviría aún su compadre Gaona en Tacurú-Pucú? Acaso viera también a su ex patrón mister Dougald, y al recibidor del obraje.\n¿Llegaría pronto? El cielo, al poniente, se abría ahora en pantalla de oro, y el río se había coloreado también. Desde la costa paraguaya, ya entenebrecida, el monte dejaba caer sobre el río su frescura crepuscular, en penetrantes efluvios de azahar y miel silvestre. Una pareja de guacamayos cruzó muy alto y en silencio hacia el Paraguay.\nAllá abajo, sobre el río de oro, la canoa derivaba velozmente, girando a ratos sobre sí misma ante el borbollón de un remolino. El hombre que iba en ella se sentía cada vez mejor, y pensaba entretanto en el tiempo justo que había pasado sin ver a su ex patrón Dougald. ¿Tres años? Tal vez no, no tanto. ¿Dos años y nueve meses? Acaso. ¿Ocho meses y medio? Eso sí, seguramente.\nDe pronto sintió que estaba helado hasta el pecho. ¿Qué sería? Y la respiración también...\nAl recibidor de maderas de mister Dougald, Lorenzo Cubilla, lo había conocido en Puerto Esperanza un viernes santo... ¿Viernes? Sí, o jueves...\nEl hombre estiró lentamente los dedos de la mano.\n—Un jueves...\nY cesó de respirar.";

// ---- Client-side book creation (articles, shared text, demo) ----
// Same id scheme as the server (slug + content hash) so re-sharing the same
// content upserts instead of duplicating.
async function contentId(title,text){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
  const h=[...new Uint8Array(buf)].slice(0,6).map(b=>b.toString(16).padStart(2,'0')).join('');
  const stem=(title||'texto').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40)||'texto';
  return stem+'-'+h;
}
async function saveTextAsBook(title,text,author=''){
  text=(text||'').trim();
  if(!text) throw new Error('No hay texto');
  title=(title||'').trim()||text.split(/\s+/).slice(0,6).join(' ');
  const words=text.split(/\s+/).filter(Boolean).length;
  const book={ id:await contentId(title,text), title, author,
    added:new Date().toISOString(), chapters:[{title,text,words}] };
  await idbPutBook(book);
  return book;
}
function coverStyle(id){
  let h=0; for(let i=0;i<id.length;i++){ h=(h*31+id.charCodeAt(i))>>>0; }
  const h1=h%360, h2=(h1+40+h%80)%360;
  return `background:linear-gradient(135deg,hsl(${h1},45%,34%),hsl(${h2},55%,20%))`;
}

// ==================== SPLIT DRAG ====================
(function initSplit(){
  let dragging=false, startY=0, startH=0;
  const containerH = () => splitContainer.clientHeight;
  const controlsH = () => 0; // controls are outside split-container

  splitHandle.addEventListener('pointerdown', e => {
    dragging=true; startY=e.clientY;
    startH=splitRsvp.offsetHeight;
    splitHandle.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  splitHandle.addEventListener('pointermove', e => {
    if(!dragging) return;
    const dy = e.clientY - startY;
    const newH = startH + dy;
    const total = containerH() - splitHandle.offsetHeight;
    const ratio = Math.max(0.15, Math.min(0.7, newH / total));
    app.splitRatio = ratio;
    applySplit();
  });
  splitHandle.addEventListener('pointerup', () => { dragging=false; });
})();

function applySplit() {
  const total = splitContainer.clientHeight - splitHandle.offsetHeight;
  const rsvpH = Math.round(total * app.splitRatio);
  splitRsvp.style.height = rsvpH + 'px';
  splitRsvp.style.flex = 'none';
  // reader gets the rest via flex:1
}

async function loadLibrary() {
  const list=$('#library-list');
  try {
    const books=(await idbAllBooks()).sort((a,b)=>(b.added||'').localeCompare(a.added||''));
    updateStorageInfo();
    if(!books.length){
      list.innerHTML=`<div class="library-empty">No hay libros en este dispositivo.<br><br>
        Compartí una página o un PDF/EPUB desde otra app,<br>cargá un archivo, o pegá texto/URL.
        <div class="empty-actions"><button id="btn-demo">Probar con un cuento (5 min)</button></div></div>`;
      $('#btn-demo').addEventListener('click',async()=>{
        const book=await saveTextAsBook(DEMO_TITLE,DEMO_TEXT,DEMO_AUTHOR);
        openBook(book.id);
      });
      return;
    }

    // Hero: el libro con progreso más reciente, directo a la palabra exacta
    let latest=null;
    for(const b of books){
      const p=getProgress(b.id);
      if(!p||!p.timestamp) continue;
      const ch=b.chapters[p.chapterIdx];
      const finished=p.chapterIdx===b.chapters.length-1&&ch&&p.wordIndex>=ch.words;
      if(!finished&&(!latest||p.timestamp>latest.p.timestamp)) latest={b,p};
    }
    let html='';
    if(latest){
      const ch=latest.b.chapters[latest.p.chapterIdx];
      const pct=ch&&ch.words?Math.min(100,latest.p.wordIndex/ch.words*100).toFixed(0):0;
      html+=`<div class="continue-hero" id="continue-hero">
        <div class="hero-label">Continuar leyendo</div>
        <div class="hero-book">${esc(latest.b.title)}</div>
        <div class="hero-detail">${esc(ch?ch.title:'')} · ${pct}% del capítulo</div>
      </div>`;
    }
    const stats=loadStats();
    if(stats.totalWords){
      const avg=stats.totalMs>0?Math.round(stats.totalWords/(stats.totalMs/60000)):0;
      const today=(stats.days&&stats.days[todayKey()])||0;
      const streak=calcStreak(stats.days);
      html+=`<div class="stats-strip">
        <div class="stat"><div class="stat-v">${streak}</div><div class="stat-l">${streak===1?'día de racha':'días de racha'}</div></div>
        <div class="stat"><div class="stat-v">${fmtCompact(today)}</div><div class="stat-l">palabras hoy</div></div>
        <div class="stat"><div class="stat-v">${fmtCompact(stats.totalWords)}</div><div class="stat-l">palabras totales</div></div>
        <div class="stat"><div class="stat-v">${avg||'–'}</div><div class="stat-l">wpm promedio</div></div>
      </div>`;
    }
    for(const b of books){
      const nCh=b.chapters.length, words=b.chapters.reduce((s,c)=>s+c.words,0);
      const prog=getProgress(b.id), read=getReadChapters(b.id);
      const pct=nCh>0?(read.length/nCh*100).toFixed(0):0;
      const resume=prog?`<div class="bc-resume">Continuar: cap. ${prog.chapterIdx+1}, palabra ${prog.wordIndex}</div>`:'';
      html+=`<div class="book-card" data-id="${esc(b.id)}">
        <button class="bc-del" data-del="${esc(b.id)}" title="Eliminar del dispositivo">&times;</button>
        <div class="bc-row">
          <div class="bc-cover" style="${coverStyle(b.id)}">${esc((b.title||'?').trim()[0].toUpperCase())}</div>
          <div class="bc-body">
            <div class="bc-title">${esc(b.title)}</div>
            <div class="bc-meta">${esc(b.author||'')} ${b.author?'· ':''}${nCh} cap. · ${words.toLocaleString()} palabras</div>
            ${nCh>0?`<div class="bc-progress"><div class="bc-progress-bar"><div class="bc-progress-fill" style="width:${pct}%"></div></div><div class="bc-progress-text">${read.length}/${nCh} leídos (${pct}%)</div></div>`:''}
            ${resume}
          </div>
        </div>
      </div>`;
    }
    list.innerHTML=html;
    if(latest){
      $('#continue-hero').addEventListener('click',()=>loadChapter(latest.b.id,latest.p.chapterIdx,latest.p.wordIndex));
    }
    list.querySelectorAll('.book-card').forEach(c=>c.addEventListener('click',()=>openBook(c.dataset.id)));
    list.querySelectorAll('.bc-del').forEach(d=>d.addEventListener('click',async e=>{
      e.stopPropagation();
      const id=d.dataset.del;
      if(!confirm('¿Eliminar este libro del dispositivo?'))return;
      try {
        await idbDeleteBook(id);
        localStorage.removeItem('spritz-progress-'+id);
        localStorage.removeItem('spritz-read-'+id);
        loadLibrary();
      } catch(err){ showToast('No se pudo eliminar: '+err.message); }
    }));
  } catch(err) {
    console.error('[spritz] loadLibrary failed:', err);
    list.innerHTML=`<div class="library-empty">Error cargando biblioteca: ${esc(err.message)}</div>`;
    showToast('No se pudo cargar la biblioteca: '+err.message);
  }
}

async function openBook(bookId) {
  loadingEl.classList.add('active'); loadingText.textContent='Cargando capítulos...';
  try {
    const data=await idbGetBook(bookId);
    if(!data) throw new Error('El libro no está en este dispositivo');
    if(data.chapters.length===1){
      // Artículos y textos: sin lista de capítulos, directo al lector
      const p=getProgress(bookId);
      loadChapter(bookId,0,(p&&p.chapterIdx===0)?p.wordIndex:0);
      return;
    }
    $('#ch-book-title').textContent=data.title;
    $('#ch-book-author').textContent=data.author||'';
    app.bookId=bookId;
    const read=getReadChapters(bookId), prog=getProgress(bookId);
    let html='';
    for(let i=0;i<data.chapters.length;i++){
      const c=data.chapters[i], isRead=read.includes(i), isCurrent=prog&&prog.chapterIdx===i;
      const cls=isCurrent?'ch-item resuming':'ch-item';
      html+=`<div class="${cls}" data-ch="${i}">
        <span class="ch-num">${i+1}</span>
        <div class="ch-info"><div class="ch-name">${esc(c.title)}</div>
        <div class="ch-words">${c.words.toLocaleString()} palabras${isCurrent&&prog?' · en palabra '+prog.wordIndex:''}</div></div>
        ${isRead?'<div class="ch-read"></div>':''}
        ${isCurrent?'<div class="ch-read ch-current"></div>':''}
      </div>`;
    }
    $('#chapters-list').innerHTML=html;
    showView('view-chapters');
    $('#chapters-list').querySelectorAll('.ch-item').forEach(el=>{
      el.addEventListener('click',()=>{
        const ci=parseInt(el.dataset.ch);
        loadChapter(bookId, ci, (prog&&prog.chapterIdx===ci)?prog.wordIndex:0);
      });
    });
  } catch(err){
    console.error('[spritz] openBook failed:', err);
    showToast('No se pudo abrir el libro: '+err.message);
  }
  finally{loadingEl.classList.remove('active');}
}

async function loadChapter(bookId,chIdx,fromWord=0) {
  loadingEl.classList.add('active'); loadingText.textContent='Cargando capítulo...';
  try {
    const book=await idbGetBook(bookId);
    if(!book) throw new Error('El libro no está en este dispositivo');
    const ch=book.chapters[chIdx];
    if(!ch) throw new Error('Capítulo no encontrado');
    app.bookId=bookId; app.chapterIdx=chIdx; app.totalChapters=book.chapters.length;
    startReading(ch.text, `${book.title} · ${ch.title}`, fromWord);
  } catch(err){
    console.error('[spritz] loadChapter failed:', err);
    loadingEl.classList.remove('active');
    showToast('No se pudo cargar el capítulo: '+err.message);
  }
}

// ==================== SPLIT READER ====================
function startReading(text, title, fromWord=0) {
  const words=tokenize(text);
  if(!words.length){
    loadingEl.classList.remove('active');
    showToast('No hay texto para leer.');
    return;
  }
  app.words=words; app.rawText=text; app.index=fromWord; app.title=title;
  readerInfo.textContent=title||`${words.length} palabras`;

  const nav=$('#chapter-nav');
  if(app.totalChapters>1){
    nav.style.display='flex';
    $('#btn-prev-ch').style.visibility=app.chapterIdx>0?'visible':'hidden';
    $('#btn-next-ch').style.visibility=app.chapterIdx<app.totalChapters-1?'visible':'hidden';
  } else nav.style.display='none';

  // Render plain text in ereader panel
  renderEreaderText(text);

  showView('view-reader');
  loadingEl.classList.remove('active');

  requestAnimationFrame(()=>{
    applySplit();
    displayCurrentWord();
    scrollToSpan(fromWord);
    setTimeout(play,400);
  });
}

let _wordSpans = [];
let _currentSpanIdx = -1;

function renderEreaderText(text) {
  const paragraphs = text.split(/\n+/).filter(p => p.trim());
  let idx = 0;
  const html = paragraphs.map(p => {
    const words = p.trim().split(/\s+/).filter(w => w.length > 0);
    const spans = words.map(w => `<span class="w" data-i="${idx++}">${esc(w)}</span>`);
    return `<p>${spans.join(' ')}</p>`;
  }).join('');
  splitReader.innerHTML = html;
  _wordSpans = Array.from(splitReader.querySelectorAll('.w'));
  _currentSpanIdx = -1;
  if (_wordSpans.length !== app.words.length) {
    console.warn('[spritz] word/span count mismatch:', _wordSpans.length, 'spans vs', app.words.length, 'tokens');
  }
}

function updateEreaderHighlight() {
  const newIdx = app.index;
  const oldIdx = _currentSpanIdx;
  if (oldIdx === newIdx) return;
  if (oldIdx >= 0 && oldIdx < _wordSpans.length) _wordSpans[oldIdx].classList.remove('current');
  if (newIdx > oldIdx) {
    for (let i = Math.max(0, oldIdx); i < newIdx && i < _wordSpans.length; i++) {
      _wordSpans[i].classList.add('passed');
    }
  } else if (newIdx < oldIdx) {
    for (let i = newIdx; i <= oldIdx && i < _wordSpans.length; i++) {
      _wordSpans[i].classList.remove('passed');
    }
  }
  if (newIdx >= 0 && newIdx < _wordSpans.length) {
    _wordSpans[newIdx].classList.add('current');
    _wordSpans[newIdx].classList.remove('passed');
  }
  _currentSpanIdx = newIdx;
}

function scrollToSpan(idx, opts = { block: 'center' }) {
  if (idx >= 0 && idx < _wordSpans.length && _wordSpans[idx]) {
    _wordSpans[idx].scrollIntoView(opts);
  }
}

function maybeScrollToCurrent() {
  if (_currentSpanIdx < 0 || _currentSpanIdx >= _wordSpans.length) return;
  const span = _wordSpans[_currentSpanIdx];
  if (!span) return;
  const wr = span.getBoundingClientRect();
  const cr = splitReader.getBoundingClientRect();
  if (wr.top < cr.top + 40 || wr.bottom > cr.top + cr.height * 0.7) {
    span.scrollIntoView({ block: 'center' });
  }
}

function displayCurrentWord() {
  updateEreaderHighlight();
  if(app.index>=app.words.length){
    wordDisplay.innerHTML=`<div class="finished-msg">Fin<br><span>${app.words.length} palabras</span></div>`;
    rsvpMeta.textContent='';
    stop();
    if(app.bookId&&app.chapterIdx!==null){markChapterRead(app.bookId,app.chapterIdx);saveProgress();}
    return;
  }
  wordDisplay.innerHTML=renderWord(app.words[app.index]);
  const pct=(app.index/app.words.length*100).toFixed(0);
  progressFill.style.width=pct+'%';
  readerProgress.textContent=`${app.index} / ${app.words.length}`;

  const mins=Math.round((app.words.length-app.index)/app.wpm);
  rsvpMeta.textContent=`${mins} min restantes · ${pct}%`;

  maybeScrollToCurrent();
}

function tick() {
  if(!app.playing) return;
  app.index++; displayCurrentWord();
  if(app.index%20===0) debouncedSave();
  if(app.index>=app.words.length) return;
  const base=60000/app.wpm;
  const delay=wordDelay(app.words[app.index-1],base);
  _pend.words++; _pend.ms+=delay;
  if(_pend.words>=100) flushStats();
  app.timer=setTimeout(tick, delay);
}

function play() {
  if(app.index>=app.words.length) return;
  app.playing=true; btnPlay.innerHTML='&#9646;&#9646;'; tick();
}
function stop() {
  app.playing=false; clearTimeout(app.timer);
  btnPlay.innerHTML='&#9654;';
  if(app.bookId) saveProgress();
  flushStats();
}
function togglePlay() { app.playing?stop():play(); }
function reset() { stop(); app.index=0; displayCurrentWord(); scrollToSpan(0); }
function skip(n) {
  stop();
  app.index=Math.max(0,Math.min(app.words.length-1,app.index+n));
  displayCurrentWord();
  scrollToSpan(app.index);
  debouncedSave();
}

function seekToWord(i) {
  const target = Math.max(0, Math.min(app.words.length - 1, i));
  clearTimeout(app.timer);
  app.index = target;
  displayCurrentWord();
  scrollToSpan(target);
  debouncedSave();
  if (!app.playing) { app.playing = true; btnPlay.innerHTML='&#9646;&#9646;'; }
  const base = 60000 / app.wpm;
  app.timer = setTimeout(tick, wordDelay(app.words[target], base));
}

// ==================== UPLOAD ====================
async function uploadFile() {
  const input=document.getElementById('file-input'), file=input.files[0]; if(!file)return;
  loadingEl.classList.add('active'); loadingText.textContent='Procesando...';
  try {
    const fd=new FormData(); fd.append('file',file);
    const data=await fetchJSON('/api/upload',{method:'POST',body:fd});
    await idbPutBook(data);
    input.value=''; openBook(data.id);
  } catch(err){
    console.error('[spritz] upload failed:', err);
    showToast('Error subiendo archivo: '+err.message);
  }
  finally{loadingEl.classList.remove('active');}
}

// ==================== EXTRACT ====================
// Los artículos extraídos se guardan como libros locales (progreso y resume
// incluidos), igual que los archivos — todo lo compartido aterriza en la biblioteca.
async function extractUrl() {
  const url=urlInput.value.trim();
  if(!url){ extractStatus.textContent='Ingresá una URL'; showToast('Ingresá una URL', 'error', 2000); return; }
  loadingEl.classList.add('active'); loadingText.textContent='Extrayendo...'; extractStatus.textContent='';
  try {
    const data=await fetchJSON('/api/extract',{
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({url})
    });
    const book=await saveTextAsBook(data.title||url, data.text);
    urlInput.value='';
    showToast(`Guardado en biblioteca: ${book.title}`, 'info', 2500);
    openBook(book.id);
  } catch(err){
    console.error('[spritz] extract failed:', err);
    extractStatus.textContent='Error: '+err.message;
    showToast('Error extrayendo URL: '+err.message);
  }
  finally{loadingEl.classList.remove('active');}
}

// ==================== EVENTS ====================
document.getElementById('file-input').addEventListener('change',uploadFile);
$('#btn-show-input').addEventListener('click',()=>showView('view-input'));
$('#btn-start').addEventListener('click',async()=>{
  const text=textInput.value.trim();
  if(!text){ showToast('Pegá texto para leer','error',2000); return; }
  const book=await saveTextAsBook('',text);
  textInput.value='';
  openBook(book.id);
});
$('#btn-extract').addEventListener('click',extractUrl);
btnPlay.addEventListener('click',togglePlay);
$('#btn-reset').addEventListener('click',reset);
$('#btn-back10').addEventListener('click',()=>skip(-10));
$('#btn-fwd10').addEventListener('click',()=>skip(10));
$('#btn-close').addEventListener('click',closeReader);
function setWpm(v){
  v=Math.max(100,Math.min(900,parseInt(v)||350));
  app.wpm=v; wpmSlider.value=v; wpmDisplay.textContent=v;
  try { localStorage.setItem('spritz-wpm',String(v)); } catch(err){ /* quota — no crítico */ }
  document.querySelectorAll('#wpm-presets .preset').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.wpm)===v));
}
wpmSlider.addEventListener('input',()=>setWpm(wpmSlider.value));
document.querySelectorAll('#wpm-presets .preset').forEach(b=>b.addEventListener('click',()=>setWpm(b.dataset.wpm)));
$('#btn-prev-ch').addEventListener('click',()=>{if(!app.bookId||app.chapterIdx<=0)return;stop();loadChapter(app.bookId,app.chapterIdx-1);});
$('#btn-next-ch').addEventListener('click',()=>{if(!app.bookId||app.chapterIdx>=app.totalChapters-1)return;stop();loadChapter(app.bookId,app.chapterIdx+1);});

// Keyboard
document.addEventListener('keydown',e=>{
  if(!$('#view-reader').classList.contains('active'))return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowLeft')skip(-10);
  if(e.code==='ArrowRight')skip(10);
  if(e.code==='KeyR')reset();
  if(e.code==='Escape')closeReader();
});

// Tap RSVP to toggle
wordDisplay.addEventListener('click',togglePlay);

// Click ereader: seek to clicked word (continue from there) or toggle play if no word hit
splitReader.addEventListener('click', (e) => {
  const w = e.target.closest('.w');
  if (w && w.dataset.i != null) {
    const i = parseInt(w.dataset.i);
    if (!isNaN(i)) { seekToWord(i); return; }
  }
  togglePlay();
});

// Save on hide
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ if(app.bookId)saveProgress(); flushStats(); }
});

// Resize
window.addEventListener('resize',()=>{if($('#view-reader').classList.contains('active'))applySplit();});

(function handleShareParams(){
  const params = new URLSearchParams(location.search);
  const sharedUrl = params.get('url');
  const sharedText = params.get('text');
  const sharedBook = params.get('book');
  const shareError = params.get('share-error');
  if (!sharedUrl && !sharedText && !sharedBook && !shareError) return;
  history.replaceState(null, '', '/');
  if (shareError) { showToast('Error compartiendo: ' + shareError); return; }
  if (sharedBook) { openBook(sharedBook); return; }
  if (sharedUrl) {
    urlInput.value = sharedUrl;
    showView('view-input');
    extractUrl();
    return;
  }
  if (sharedText) {
    (async()=>{
      try {
        const book=await saveTextAsBook('',sharedText);
        showToast('Guardado en biblioteca','info',2000);
        openBook(book.id);
      } catch(err){
        console.error('[spritz] shared text failed:', err);
        showToast('Error con el texto compartido: '+err.message);
      }
    })();
  }
})();

// ==================== STORAGE GUARD + EXPORT/IMPORT ====================
async function updateStorageInfo(){
  const el=$('#storage-info');
  if(!el||!navigator.storage||!navigator.storage.estimate) return;
  try {
    const {usage}=await navigator.storage.estimate();
    el.textContent=usage?(usage/1048576).toFixed(1)+' MB usados':'';
  } catch(err){ console.warn('[spritz] storage.estimate:', err); }
}
(async function guardStorage(){
  // Le pide al navegador que no desaloje IndexedDB bajo presión de espacio —
  // crítico ahora que la biblioteca vive solo acá.
  try {
    if(navigator.storage&&navigator.storage.persist){
      const granted=await navigator.storage.persist();
      console.info('[spritz] persistent storage:', granted);
    }
  } catch(err){ console.warn('[spritz] storage.persist:', err); }
})();

async function exportLibrary(){
  const books=await idbAllBooks();
  if(!books.length){ showToast('No hay libros para exportar','error',2000); return; }
  const progress={}, read={};
  for(const b of books){
    const p=getProgress(b.id); if(p)progress[b.id]=p;
    const r=getReadChapters(b.id); if(r.length)read[b.id]=r;
  }
  const payload={app:'pivot',version:1,exported:new Date().toISOString(),books,progress,read};
  const blob=new Blob([JSON.stringify(payload)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='pivot-biblioteca-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  showToast('Biblioteca exportada ('+books.length+' libros)','info',2500);
}
async function importLibrary(file){
  try {
    const payload=JSON.parse(await file.text());
    if(!payload||payload.app!=='pivot'||!Array.isArray(payload.books)) throw new Error('No es un backup de Pivot');
    let n=0;
    for(const b of payload.books){
      if(!b||!b.id||!b.title||!Array.isArray(b.chapters)) continue;
      await idbPutBook(b); n++;
      // El progreso local existente gana sobre el importado
      const p=payload.progress&&payload.progress[b.id];
      if(p&&!getProgress(b.id)) localStorage.setItem('spritz-progress-'+b.id,JSON.stringify(p));
      const r=payload.read&&payload.read[b.id];
      if(r&&!getReadChapters(b.id).length) localStorage.setItem('spritz-read-'+b.id,JSON.stringify(r));
    }
    showToast(n===1?'Importado 1 libro':'Importados '+n+' libros','info',2500);
    loadLibrary();
  } catch(err){
    console.error('[spritz] import failed:', err);
    showToast('Error importando: '+err.message);
  }
}
$('#btn-export').addEventListener('click',exportLibrary);
$('#btn-import').addEventListener('click',()=>$('#import-input').click());
$('#import-input').addEventListener('change',e=>{
  if(e.target.files[0]) importLibrary(e.target.files[0]);
  e.target.value='';
});

// SW
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

// Init
setWpm(localStorage.getItem('spritz-wpm')||350);
loadLibrary();
</script>
